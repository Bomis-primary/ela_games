<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 4 Nouns Spin-the-Wheel</title>
<style>
body, html {
    margin: 0;
    padding: 0;
    font-family: 'Arial', sans-serif;
    height: 100%;
    overflow: hidden;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}
#splash {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:white;
    display:flex; justify-content:center; align-items:center;
    z-index: 10;
}
#splash img { width:200px; }
#container { text-align: center; margin-top: 10px; }
#wheel-container { position: relative; margin: auto; width: 400px; height: 400px; }
#wheel { width: 100%; height: 100%; border-radius: 50%; border: 5px solid white; position: relative; transition: transform 4s cubic-bezier(0.33, 1, 0.68, 1);}
.sector { position: absolute; width: 50%; height: 50%; top:0; left:50%; transform-origin:0% 0%; text-align: right; padding-right: 10px; font-weight: bold; font-size: 22px; color: white;}
#pin { position: absolute; top:-20px; left:50%; margin-left:-15px; width:0; height:0; border-left:15px solid transparent; border-right:15px solid transparent; border-bottom:30px solid red; z-index: 2;}
#instructions { font-size: 18px; color: white; margin-top: 10px;}
#noun-input { width: 60%; padding:10px; font-size:18px; border-radius:10px; border:none; margin-top: 15px; }
#teacher-buttons { margin-top:10px; }
#teacher-buttons button { padding:10px 20px; margin: 0 10px; font-size:16px; font-weight:bold; border:none; border-radius:6px; cursor:pointer;}
#correctBtn {background:green; color:white;}
#wrongBtn {background:red; color:white;}
.bubble { position:absolute; border-radius:50%; background: yellow; opacity:0.7; pointer-events:none; }
</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
    <img src="g4/chp1/nouns/assets/logo.png" alt="Innovine Logo">
</div>

<div id="container">
    <div id="instructions">Spin the wheel and type a sentence using the noun type</div>
    <div id="wheel-container">
        <div id="pin"></div>
        <div id="wheel">
            <div class="sector" style="transform:rotate(0deg)">Common</div>
            <div class="sector" style="transform:rotate(72deg)">Proper</div>
            <div class="sector" style="transform:rotate(144deg)">Abstract</div>
            <div class="sector" style="transform:rotate(216deg)">Collective</div>
            <div class="sector" style="transform:rotate(288deg)">Concrete</div>
        </div>
    </div>
    <button id="spinBtn">Spin the Wheel</button>
    <input type="text" id="noun-input" placeholder="Type your sentence here">
    <div id="teacher-buttons">
        <button id="correctBtn">Correct</button>
        <button id="wrongBtn">Wrong</button>
    </div>
</div>

<audio id="correctSound" src="g4/chp1/nouns/assets/correct.mp3"></audio>
<audio id="wrongSound" src="g4/chp1/nouns/assets/wrong.mp3"></audio>
<audio id="applauseSound" src="g4/chp1/nouns/assets/freesound_community-claps-44774.mp3"></audio>

<script>
const splash = document.getElementById('splash');
const wheel = document.getElementById('wheel');
const spinBtn = document.getElementById('spinBtn');
const nounInput = document.getElementById('noun-input');
const nounTypeDisplay = document.getElementById('instructions');
const correctBtn = document.getElementById('correctBtn');
const wrongBtn = document.getElementById('wrongBtn');
const correctSound = document.getElementById('correctSound');
const wrongSound = document.getElementById('wrongSound');
const applauseSound = document.getElementById('applauseSound');
const nounTypes = ["Common","Proper","Abstract","Collective","Concrete"];
let currentNoun = '';
let spinning = false;
let totalQuestions = 0;

// Splash for 3s
setTimeout(()=>{ splash.style.display='none'; }, 3000);

// Floating yellow bubbles
for(let i=0;i<25;i++){
    const b = document.createElement('div');
    b.className='bubble';
    b.style.width = b.style.height = (10+Math.random()*15)+'px';
    b.style.left = Math.random()*window.innerWidth+'px';
    b.style.top = Math.random()*window.innerHeight+'px';
    document.body.appendChild(b);
}

// Spin Wheel
spinBtn.addEventListener('click', ()=>{
    if(spinning || totalQuestions>=20) return;
    spinning = true;
    const randIndex = Math.floor(Math.random()*nounTypes.length);
    currentNoun = nounTypes[randIndex];
    const deg = 720 + randIndex*72 + 36; // multiple spins + half sector
    wheel.style.transform = `rotate(${deg}deg)`;
    setTimeout(()=>{
        nounTypeDisplay.textContent = `Pin landed on: ${currentNoun}`;
        spinning=false;
        totalQuestions++;
    }, 4200);
});

// Teacher validation
correctBtn.addEventListener('click', ()=>{
    correctSound.play();
    applauseSound.play();
    alert("Marked Correct! Next spin.");
    nounInput.value='';
});

wrongBtn.addEventListener('click', ()=>{
    wrongSound.play();
    alert("Marked Wrong! Next spin.");
    nounInput.value='';
});
</script>

</body>
</html>
