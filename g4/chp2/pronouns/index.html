<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pronouns Quest - Grade 4</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#141e30;color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:10px;}
.splash-screen{position:fixed;inset:0;background:#fff;display:flex;justify-content:center;align-items:center;z-index:9999;transition:opacity 0.5s;}
.splash-screen.hidden{opacity:0;pointer-events:none;}
.splash-screen img{max-width:480px;width:90%;height:auto;animation:logoFloat 2s ease-in-out infinite;}
@keyframes logoFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.container{max-width:1100px;width:100%;background:#0b1020;border-radius:20px;border:3px solid #ffd700;overflow:hidden;opacity:0;transition:opacity 0.6s;}
.container.visible{opacity:1;}
.header{padding:20px;text-align:center;background:linear-gradient(135deg,#ffd700,#ff9f1c);color:#1a1a2e;}
.header h1{font-size:28px;letter-spacing:1px;text-shadow:1px 1px 3px rgba(0,0,0,0.3);}
.stage-indicator{margin-top:5px;display:inline-block;padding:6px 16px;border-radius:20px;background:rgba(26,26,46,0.9);border:2px solid #ffd700;color:#ffd700;font-weight:bold;font-size:14px;}
.board-wrapper{display:flex;flex-wrap:wrap;padding:20px;gap:20px;}
.board-area{flex:1.2;min-width:320px;background:#1e293b;border-radius:12px;border:2px solid rgba(148,163,184,0.6);padding:20px;position:relative;}
.board-title{text-align:center;font-size:16px;margin-bottom:8px;color:#e5e7eb;font-weight:bold;}
.board-path{position:relative;margin-top:10px;padding:10px;}
.cells{display:grid;grid-template-columns:repeat(5,1fr);grid-auto-rows:60px;gap:10px;position:relative;z-index:1;}
.cell{position:relative;border-radius:12px;border:2px solid rgba(148,163,184,0.9);background:#243b55;display:flex;align-items:center;justify-content:center;font-size:14px;color:#e5e7eb;}
.cell.start{background:#22c55e;font-weight:bold;}
.cell.finish{background:#facc15;font-weight:bold;}
.token{position:absolute;width:24px;height:24px;border-radius:50%;background:#f97316;border:2px solid #fed7aa;display:flex;align-items:center;justify-content:center;font-size:16px;transform:translate(-50%,-60%);transition:all 0.5s;}
.question-panel{margin-top:10px;background:#1f2937;border-radius:12px;border:1px solid rgba(148,163,184,0.7);padding:12px;}
.question-title{font-weight:bold;color:#facc15;margin-bottom:6px;}
.question-text{margin-bottom:8px;}
.options{display:flex;flex-direction:column;gap:6px;}
.option-btn{border-radius:6px;border:1px solid #94a3b8;background:#0f172a;color:#e5e7eb;padding:6px;cursor:pointer;transition:all 0.2s;}
.option-btn:hover{background:#1e293b;}
.option-btn.correct{background:#16a34a;color:#ecfdf5;border-color:#4ade80;}
.option-btn.wrong{background:#b91c1c;color:#fee2e2;border-color:#f87171;}
.option-btn.disabled{pointer-events:none;opacity:0.7;}
.feedback{margin-top:6px;font-size:13px;padding:6px;border-radius:6px;display:none;}
.feedback.correct{background:rgba(22,163,74,0.2);border:1px solid #4ade80;color:#bbf7d0;}
.feedback.wrong{background:rgba(185,28,28,0.2);border:1px solid #fca5a5;color:#fecaca;}
.controls{margin-top:8px;}
.btn-primary{padding:8px 16px;border-radius:16px;background:#facc15;border:none;color:#111827;display:none;cursor:pointer;}
.btn-primary:hover{background:#eab308;}
</style>
</head>
<body>

<div class="splash-screen" id="splashScreen">
<img src="assets/logo.png" alt="Logo">
</div>

<div class="container" id="mainContainer">
<div class="header">
<h1>🌌 PRONOUN QUEST 🌌</h1>
<div class="stage-indicator" id="stageIndicator">Step 1 of 10</div>
</div>

<div class="board-wrapper">
<div class="board-area">
<div class="board-title">Journey from Confusion to Clarity</div>
<div class="board-path">
<div class="cells" id="cellsContainer"></div>
<div class="token" id="token">🔮</div>
</div>
</div>
</div>

<div class="question-panel" id="questionPanel">
<div class="question-title">Question</div>
<div class="question-text" id="questionText"></div>
<div class="options" id="optionsContainer"></div>
<div class="feedback" id="feedback"></div>
<div class="controls">
<button class="btn-primary" id="nextBtn">Next Step →</button>
</div>
</div>

<script>
// Splash screen + init
setTimeout(()=>{
document.getElementById('splashScreen').classList.add('hidden');
document.getElementById('mainContainer').classList.add('visible');
initGame();
},3000);

// Audio
const correctSound=new Audio('assets/correct.mp3');
const wrongSound=new Audio('assets/wrong.mp3');
const celebrationSound=new Audio('assets/freesound_community-claps-44774.mp3');

// Question bank
const questionBank=[
{question:"___ is my best friend.",options:["He","She","It","They"],correct:0,explanation:"He is correct for male friend."},
{question:"Maria gave the book to ___ .",options:["he","him","his","she"],correct:1,explanation:"Him is object pronoun."},
{question:"John and I went to the park. ___ played football.",options:["We","Us","They","Them"],correct:0,explanation:"We is subject pronoun."},
{question:"The cat is sleeping. ___ is very tired.",options:["He","It","They","She"],correct:1,explanation:"It refers to cat."},
{question:"This is my book. The book is ___ .",options:["mine","my","me","I"],correct:0,explanation:"Mine is possessive."},
{question:"I made this cake by ___ .",options:["myself","himself","yourself","themselves"],correct:0,explanation:"Myself is correct."},
{question:"Sarah and Tom are coming. ___ will join the game.",options:["They","Them","He","Him"],correct:0,explanation:"They is correct."},
{question:"The teacher gave us homework. ___ is difficult.",options:["It","They","He","She"],correct:0,explanation:"It refers to homework."},
{question:"Peter is late. ___ forgot his bag.",options:["He","Him","His","They"],correct:0,explanation:"He is subject pronoun."},
{question:"Lucy likes painting. ___ is very talented.",options:["She","Her","They","It"],correct:0,explanation:"She is correct."}
];

const TOTAL_STEPS=10;
let currentIndex=0,correctCount=0;
const cellsContainer=document.getElementById('cellsContainer');
const token=document.getElementById('token');
const questionText=document.getElementById('questionText');
const optionsContainer=document.getElementById('optionsContainer');
const feedback=document.getElementById('feedback');
const nextBtn=document.getElementById('nextBtn');
const stageIndicator=document.getElementById('stageIndicator');

function initBoard(){
cellsContainer.innerHTML='';
for(let i=0;i<TOTAL_STEPS+2;i++){
const cell=document.createElement('div');
cell.className='cell';
if(i===0){cell.classList.add('start');cell.innerText='Start';}
else if(i===TOTAL_STEPS+1){cell.classList.add('finish');cell.innerText='Finish';}
else{cell.innerText=`Step ${i}`;}
cellsContainer.appendChild(cell);
}
moveToken(0);
}

function moveToken(step){
const cells=document.querySelectorAll('.cell');
const target=cells[step+1];
const rect=target.getBoundingClientRect();
const parentRect=cellsContainer.getBoundingClientRect();
const left=target.offsetLeft+target.offsetWidth/2;
const top=target.offsetTop+target.offsetHeight/2;
token.style.left=left+'px';
token.style.top=top+'px';
}

function initGame(){
currentIndex=0;correctCount=0;
initBoard();
loadQuestion();
}

function loadQuestion(){
const q=questionBank[currentIndex];
questionText.textContent=q.question;
optionsContainer.innerHTML='';
feedback.style.display='none';
q.options.forEach((opt,i)=>{
const btn=document.createElement('button');
btn.className='option-btn';
btn.textContent=opt;
btn.onclick=()=>selectAnswer(i);
optionsContainer.appendChild(btn);
});
stageIndicator.textContent=`Step ${currentIndex+1} of ${TOTAL_STEPS}`;
moveToken(currentIndex);
nextBtn.style.display='none';
}

function selectAnswer(idx){
const q=questionBank[currentIndex];
const buttons=document.querySelectorAll('.option-btn');
buttons.forEach((b,i)=>b.classList.add('disabled'));
if(idx===q.correct){buttons[idx].classList.add('correct');feedback.textContent='Correct! '+q.explanation;feedback.className='feedback correct';correctCount++;correctSound.play();}
else{buttons[idx].classList.add('wrong');feedback.textContent='Wrong! '+q.explanation;feedback.className='feedback wrong';wrongSound.play();}
feedback.style.display='block';
nextBtn.style.display='inline-block';
nextBtn.onclick=()=>{currentIndex++;if(currentIndex<TOTAL_STEPS){loadQuestion();}else{endGame();}};
}

function endGame(){
alert(`Game Over! You scored ${correctCount} / ${TOTAL_STEPS}`);
celebrationSound.play();
}
</script>
</body>
</html>
