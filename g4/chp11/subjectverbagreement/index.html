<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subject-Verb Agreement Maze</title>
<style>
/* Keep all original styles from Motivation Maze Runner */
body{margin:0;padding:0;font-family:Arial,sans-serif;background:#141e30;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;}
#splashScreen{position:fixed;inset:0;background:#fff;display:flex;justify-content:center;align-items:center;z-index:9999;}
#splashScreen img{width:300px;height:auto;}
#gameContainer{display:none;width:90%;max-width:1000px;}
.maze{position:relative;background:#0b1020;width:100%;height:400px;margin-bottom:20px;border-radius:12px;overflow:hidden;}
#player{position:absolute;width:40px;height:40px;background:#facc15;border-radius:50%;top:0;left:0;}
.star{position:absolute;width:30px;height:30px;background:#16a34a;border-radius:50%;}
#questionModal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1e293b;padding:20px;border-radius:12px;border:2px solid #ffd700;max-width:400px;width:90%;z-index:1000;}
#questionText{margin-bottom:10px;}
.option-btn{display:block;width:100%;margin:5px 0;padding:10px;border-radius:8px;border:1px solid #94a3b8;background:#0f172a;color:#fff;cursor:pointer;}
.option-btn.correct{background:#16a34a;color:#fff;border-color:#4ade80;}
.option-btn.wrong{background:#b91c1c;color:#fff;border-color:#f87171;}
#feedback{margin-top:5px;font-weight:bold;}
#scorePanel{margin-top:10px;font-size:16px;}
#finalScreen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);color:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:999;}
#finalScreen h2{margin-bottom:10px;}
#playAgainBtn{padding:10px 20px;background:#16a34a;border:none;color:#fff;border-radius:12px;cursor:pointer;}
#playAgainBtn:hover{background:#22c55e;}
</style>
</head>
<body>

<div id="splashScreen">
<img src="assets/logo.png" alt="Logo">
</div>

<div id="gameContainer">
<div class="maze" id="maze">
<div id="player"></div>
</div>

<div id="questionModal">
<div id="questionText"></div>
<div id="optionsContainer"></div>
<div id="feedback"></div>
</div>

<div id="scorePanel">Score: 0 / 0</div>
</div>

<div id="finalScreen">
<h2>Game Complete!</h2>
<div id="finalScore"></div>
<div id="finalRank"></div>
<button id="playAgainBtn">Play Again</button>
</div>

<script>
// Audio
const correctSound = new Audio('assets/correct.mp3');
const wrongSound = new Audio('assets/wrong.mp3');
const celebrationSound = new Audio('assets/freesound_community-claps-44774.mp3');

// Player and maze
const player = document.getElementById('player');
const maze = document.getElementById('maze');
const mazeWidth = maze.offsetWidth - 40;
const mazeHeight = maze.offsetHeight - 40;
let playerPos = {x:0,y:0};

// Subject-Verb Agreement Questions (15)
const questionBank = [
{scenario:"He ___ (go) to school every day.",options:["go","goes","went","will go"],correct:1},
{scenario:"They ___ (play) football on weekends.",options:["plays","play","played","will play"],correct:1},
{scenario:"She ___ (have) a lot of homework.",options:["have","has","had","will have"],correct:1},
{scenario:"The cat ___ (sleep) on the sofa.",options:["sleep","sleeps","slept","will sleep"],correct:1},
{scenario:"We ___ (study) for the test yesterday.",options:["study","studies","studied","will study"],correct:2},
{scenario:"The children ___ (be) happy.",options:["is","are","was","will be"],correct:1},
{scenario:"He ___ (watch) TV every evening.",options:["watch","watches","watched","will watch"],correct:1},
{scenario:"The dogs ___ (bark) loudly.",options:["bark","barks","barked","will bark"],correct:0},
{scenario:"She and her brother ___ (go) to the park.",options:["go","goes","went","will go"],correct:0},
{scenario:"The teacher ___ (explain) the lesson clearly.",options:["explain","explains","explained","will explain"],correct:1},
{scenario:"Each student ___ (have) a notebook.",options:["have","has","had","will have"],correct:1},
{scenario:"Neither John nor Peter ___ (like) vegetables.",options:["like","likes","liked","will like"],correct:1},
{scenario:"The team ___ (win) the match yesterday.",options:["win","wins","won","will win"],correct:2},
{scenario:"I ___ (write) a letter to my friend last week.",options:["write","writes","wrote","will write"],correct:2},
{scenario:"Next week, they ___ (start) a new project.",options:["start","starts","started","will start"],correct:3}
];

let currentQuestion = 0;
let score = 0;

// Hide splash screen and show game
setTimeout(()=>{
document.getElementById('splashScreen').style.display='none';
document.getElementById('gameContainer').style.display='block';
placeStar();
},3000);

// Maze star placement and question trigger
function placeStar(){
const star = document.createElement('div');
star.className='star';
star.style.left = Math.floor(Math.random()*mazeWidth)+'px';
star.style.top = Math.floor(Math.random()*mazeHeight)+'px';
maze.appendChild(star);

star.addEventListener('click',()=>{
maze.removeChild(star);
showQuestion();
});
}

// Show question modal
function showQuestion(){
const modal = document.getElementById('questionModal');
const q = questionBank[currentQuestion];
document.getElementById('questionText').textContent = q.scenario;
const container = document.getElementById('optionsContainer');
container.innerHTML='';
document.getElementById('feedback').textContent='';
modal.style.display='block';

q.options.forEach((opt,i)=>{
  const btn = document.createElement('button');
  btn.className='option-btn';
  btn.textContent = opt;
  btn.onclick = () => checkAnswer(i);
  container.appendChild(btn);
});
}

// Check answer
function checkAnswer(idx){
const q = questionBank[currentQuestion];
const buttons = document.querySelectorAll('.option-btn');
buttons.forEach(b=>b.disabled=true);

if(idx===q.correct){
buttons[idx].classList.add('correct');
document.getElementById('feedback').textContent='Correct!';
score++;
correctSound.play();
}else{
buttons[idx].classList.add('wrong');
document.getElementById('feedback').textContent='Wrong!';
wrongSound.play();
}

// Next question after 1.2 sec
setTimeout(()=>{
currentQuestion++;
if(currentQuestion>=questionBank.length){
endGame();
}else{
document.getElementById('questionModal').style.display='none';
placeStar();
}
},1200);
}

// End game
function endGame(){
document.getElementById('gameContainer').style.display='none';
document.getElementById('finalScreen').style.display='flex';
document.getElementById('finalScore').textContent=`You scored ${score} / ${questionBank.length}`;
let rank='';
if(score>=13) rank='Master Detective';
else if(score>=10) rank='Skilled Investigator';
else if(score>=6) rank='Novice Detective';
else rank='Apprentice';
document.getElementById('finalRank').textContent=rank;
celebrationSound.play();
}

document.getElementById('playAgainBtn').onclick=()=>{location.reload();}
</script>
</body>
</html>
